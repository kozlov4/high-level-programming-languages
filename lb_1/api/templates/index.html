{% extends "base.html" %}
{% block title %}Сьогодні{% endblock %}
{% block content %}
    <h2 class="mb-4">Актуальний курс на сьогодні</h2>
    <table class="table table-striped table-hover border">
        <thead class="table-dark">
            <tr>
                <th>Назва валюти</th>
                <th>Курс купівлі</th>
                <th>Курс продажу</th>
            </tr>
        </thead>
        <tbody id="rates-tbody">
            <tr><td colspan="3" class="text-center">Завантаження даних...</td></tr>
        </tbody>
    </table>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/rates/today/')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('rates-tbody');
                    tbody.innerHTML = '';
                    
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center">На сьогодні курсів ще не додано.</td></tr>';
                        return;
                    }

                    data.forEach(rate => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${rate.currency.name} (${rate.currency.code})</td>
                            <td>${rate.buy_rate}</td>
                            <td>${rate.sell_rate}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Помилка:', error);
                    document.getElementById('rates-tbody').innerHTML = '<tr><td colspan="3" class="text-center text-danger">Помилка завантаження даних</td></tr>';
                });
        });
    </script>
{% endblock %}
